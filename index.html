<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI & L&D Webinar Series — 360Learning Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  /* ---------- 360Learning brand tokens ---------- */
  :root{
    --ink:        #18191D;
    --ink-soft:   #212227;
    --latte:      #FBF6F2;
    --latte-2:    #F5F0E9;
    --blue:       #5185F6;
    --blue-soft:  #7CA4F8;
    --blue-tint:  #D3E1FD;
    --green:      #4AC994;
    --green-soft: #55D49F;
    --orange:     #FFAA78;
    --orange-soft:#FFB68B;
    --purple:     #B085EE;
    --purple-soft:#BB97F1;
    --yellow:     #FFD456;
    --yellow-soft:#FFDA6E;

    --radius-lg: 28px;
    --radius-md: 16px;
    --radius-sm: 10px;

    --shadow-card: 0 1px 0 rgba(24,25,29,.04), 0 24px 56px -28px rgba(24,25,29,.28);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body{
    font-family:'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.01em;
    overflow: hidden;
  }

  /* ---------- Banner shell ---------- */
  .banner{
    width:min(1080px, 100%);
    background: linear-gradient(135deg, #1E3A8A 0%, var(--ink) 45%, #2A2140 100%);
    color:#fff;
    border-radius: var(--radius-lg);
    padding: clamp(22px, 3vw, 32px) clamp(22px, 3.4vw, 36px);
    box-shadow: var(--shadow-card);
    display:grid;
    grid-template-columns: 1fr auto;
    gap: clamp(20px, 3vw, 32px);
    align-items:center;
    position:relative;
    overflow:hidden;
    animation: rise .7s cubic-bezier(.2,.7,.2,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Decorative gradient blob */
  .banner::before{
    content:"";
    position:absolute;
    top:-140px; right:-100px;
    width: 420px; height: 420px;
    border-radius:50%;
    background: conic-gradient(from 200deg, var(--blue) 0deg, var(--purple) 120deg, var(--orange) 230deg, var(--yellow) 320deg, var(--blue) 360deg);
    filter: blur(80px);
    opacity:.5;
    z-index:0;
    pointer-events:none;
    animation: drift 18s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    50%      { transform: translate(-20px, 15px) rotate(20deg); }
  }

  /* Subtle grid texture */
  .banner::after{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(600px 400px at 20% 50%, #000, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .banner > * { position:relative; z-index:1; }

  /* ---------- LEFT: Text content ---------- */
  .content{
    display:flex;
    flex-direction:column;
    gap: 14px;
    max-width: 560px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--yellow);
    width: max-content;
  }
  .eyebrow .live-dot{
    width:8px; height:8px;
    border-radius:50%;
    background: var(--yellow);
    box-shadow: 0 0 0 0 rgba(255,212,86,.6);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,212,86,.6); }
    70%  { box-shadow: 0 0 0 10px rgba(255,212,86,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,212,86,0); }
  }

  h1{
    margin: 0;
    font-size: clamp(24px, 3.2vw, 40px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing:-0.025em;
  }
  h1 em{
    font-style: italic;
    font-weight: 500;
    color: var(--yellow);
    position:relative;
    white-space:nowrap;
  }
  h1 em::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom: 2px;
    height: 6px;
    background: var(--yellow);
    opacity:.2;
    border-radius: 4px;
    transform: skew(-8deg);
  }

  .sub{
    font-size: clamp(14px, 1.3vw, 15.5px);
    font-weight: 500;
    color: rgba(255,255,255,.72);
    line-height: 1.5;
    max-width: 48ch;
  }

  /* Meta chips: next session info */
  .meta{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-top: 6px;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap: 7px;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.1);
    backdrop-filter: blur(8px);
    color: #fff;
  }
  .chip svg{ width:14px; height:14px; }
  .chip .accent-dot{
    width: 6px; height: 6px; border-radius:50%;
  }

  /* CTA row */
  .cta-row{
    display:flex;
    align-items:center;
    gap: 14px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .btn-primary{
    display:inline-flex;
    align-items:center;
    gap: 10px;
    background: var(--yellow);
    color: var(--ink);
    border: none;
    padding: clamp(11px, 1.2vw, 13px) clamp(18px, 2vw, 22px);
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(13px, 1.2vw, 14.5px);
    cursor: pointer;
    transition: transform .2s ease, box-shadow .25s ease, background .2s ease;
    text-decoration: none;
  }
  .btn-primary:hover{
    transform: translateY(-2px);
    background: #fff;
    box-shadow: 0 12px 28px -10px rgba(255,212,86,.5);
  }
  .btn-primary svg{ width:15px; height:15px; transition: transform .2s ease; }
  .btn-primary:hover svg{ transform: translateX(4px); }

  .btn-secondary{
    display:inline-flex;
    align-items:center;
    gap: 8px;
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.35);
    padding: clamp(9.5px, 1.1vw, 11.5px) clamp(16px, 1.8vw, 20px);
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(13px, 1.2vw, 14.5px);
    cursor: pointer;
    text-decoration: none;
    transition: transform .2s ease, border-color .2s ease, background .2s ease, box-shadow .25s ease;
  }
  .btn-secondary:hover{
    transform: translateY(-2px);
    border-color: #fff;
    background: rgba(255,255,255,.08);
    box-shadow: 0 10px 24px -10px rgba(255,255,255,.25);
  }
  .btn-secondary svg{ width:14px; height:14px; transition: transform .2s ease; }
  .btn-secondary:hover svg{ transform: scale(1.1); }

  /* ---------- RIGHT: Session stack visual ---------- */
  .visual{
    position: relative;
    width: 280px;
    height: 220px;
    flex-shrink: 0;
  }

  .card{
    position: absolute;
    background: #fff;
    color: var(--ink);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    width: 240px;
    box-shadow: 0 20px 40px -12px rgba(0,0,0,.4), 0 2px 0 rgba(255,255,255,.08) inset;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: cardIn .7s cubic-bezier(.2,.7,.2,1) forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(.95); }
    to   { opacity: 1; }
  }

  .card .badge{
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    border-radius: 12px;
    padding: 6px 4px;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card .badge svg{ width: 22px; height: 22px; }

  .card .info{
    min-width: 0;
    flex: 1;
  }
  .card .info .title{
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing:-0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .info .sub{
    font-size: 11.5px;
    font-weight: 500;
    color: #6b6e78;
    margin-top: 2px;
    display:flex;
    align-items:center;
    gap: 5px;
  }
  .card .info .sub svg{ width:11px; height:11px; }

  /* Stacked card positioning */
  .card-3{
    top: 0; right: 0;
    transform: rotate(4deg);
    animation-delay: .15s;
  }
  .card-3 .badge{ background: var(--purple-soft); color: #3b1d6b; }

  .card-2{
    top: 58px; right: 18px;
    transform: rotate(-2deg);
    animation-delay: .3s;
  }
  .card-2 .badge{ background: var(--green-soft); color: #0a4a2e; }

  .card-1{
    top: 116px; right: 6px;
    transform: rotate(2deg);
    animation-delay: .45s;
    box-shadow: 0 24px 50px -12px rgba(0,0,0,.5), 0 0 0 2px var(--yellow);
  }
  .card-1 .badge{ background: var(--yellow); color: var(--ink); }

  .card-1 .featured-badge{
    position:absolute;
    top: -8px; right: -8px;
    background: var(--yellow);
    color: var(--ink);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 999px;
    box-shadow: 0 4px 10px rgba(0,0,0,.2);
  }

  /* ---------- Logo lockup ---------- */
  .logo-lockup{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .logo-lockup .presented{
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,.5);
    white-space: nowrap;
  }
  .logo-lockup .divider{
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,.2);
  }
  .logo-lockup img{
    height: 22px;
    width: auto;
    display: block;
    opacity: .95;
  }

  /* ---------- Floating particles — subtle AI/neural theme ---------- */
  .particles{
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .particles span{
    position:absolute;
    display:block;
    border-radius:50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  .particles span:nth-child(1)  { left: 8%;  width:3px; height:3px; background: var(--blue-soft);  animation-duration: 14s; animation-delay:  0s; }
  .particles span:nth-child(2)  { left: 18%; width:5px; height:5px; background: var(--yellow);     animation-duration: 18s; animation-delay:  2s; }
  .particles span:nth-child(3)  { left: 28%; width:3px; height:3px; background: var(--green-soft); animation-duration: 16s; animation-delay:  5s; }
  .particles span:nth-child(4)  { left: 35%; width:4px; height:4px; background: var(--purple-soft);animation-duration: 20s; animation-delay:  1s; }
  .particles span:nth-child(5)  { left: 45%; width:3px; height:3px; background: var(--blue-soft);  animation-duration: 15s; animation-delay:  7s; }
  .particles span:nth-child(6)  { left: 55%; width:5px; height:5px; background: var(--yellow);     animation-duration: 22s; animation-delay:  3s; }
  .particles span:nth-child(7)  { left: 62%; width:3px; height:3px; background: var(--orange-soft);animation-duration: 17s; animation-delay:  9s; }
  .particles span:nth-child(8)  { left: 72%; width:4px; height:4px; background: var(--purple-soft);animation-duration: 19s; animation-delay:  4s; }
  .particles span:nth-child(9)  { left: 82%; width:3px; height:3px; background: var(--green-soft); animation-duration: 16s; animation-delay:  6s; }
  .particles span:nth-child(10) { left: 92%; width:4px; height:4px; background: var(--blue-soft);  animation-duration: 21s; animation-delay:  8s; }

  @keyframes float-up {
    0%   { transform: translateY(110%) translateX(0);    opacity: 0; }
    15%  { opacity: .55; }
    85%  { opacity: .55; }
    100% { transform: translateY(-30%) translateX(30px); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .particles span,
    .banner::before,
    .eyebrow .live-dot { animation: none !important; }
  }

  /* ---------- Responsive ---------- */
  /* Laptop / narrow desktop — shrink card stack to keep two-column layout */
  @media (max-width: 1000px){
    .visual{
      width: 200px;
      height: 160px;
    }
    .card{
      width: 180px;
      padding: 10px 12px;
    }
    .card .badge{
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }
    .card .badge svg{ width: 17px; height: 17px; }
    .card .info .title{ font-size: 12px; }
    .card .info .sub{ font-size: 10px; }
    .card-2{ top: 44px; right: 14px; }
    .card-1{ top: 88px; right: 4px; }
    .card-1 .featured-badge{ font-size: 9px; padding: 2px 6px; }
  }

  /* Tighter still for very narrow iframes */
  @media (max-width: 820px){
    .visual{
      width: 170px;
      height: 150px;
    }
    .card{
      width: 160px;
    }
    .card-2{ top: 40px; }
    .card-1{ top: 80px; }
  }

  /* Finally stack vertically only when truly tight */
  @media (max-width: 640px){
    .banner{
      grid-template-columns: 1fr;
      padding: 24px;
      gap: 24px;
    }
    .visual{
      width: 100%;
      height: 180px;
      max-width: 260px;
      margin: 0 auto;
    }
    .card{
      width: 220px;
      padding: 12px 14px;
    }
    .card .badge{
      width: 42px;
      height: 42px;
      border-radius: 12px;
    }
    .card .badge svg{ width: 20px; height: 20px; }
    .card .info .title{ font-size: 13px; }
    .card .info .sub{ font-size: 11px; }
    .card-2{ top: 50px; right: 14px; }
    .card-1{ top: 100px; right: 4px; }
  }
  @media (max-width: 420px){
    .banner{ padding: 20px 18px; }
    .cta-row{ gap: 12px; }
    .btn-secondary{ width: 100%; justify-content: center; }
    .visual{ display:none; }
  }
</style>
</head>
